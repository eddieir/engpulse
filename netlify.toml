# ─────────────────────────────────────────────
# Build configuration
# @netlify/plugin-nextjs v5 handles all Next.js
# serverless functions and edge functions automatically.
# ─────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Prevent npm from treating warnings as errors in CI
  CI = "false"
  # Speed up installs
  NPM_FLAGS = "--prefer-offline"
  # Supabase — public project URL (safe to commit, also set in Netlify dashboard)
  NEXT_PUBLIC_SUPABASE_URL = "https://bwwmdrzsedufwrbzasky.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3d21kcnpzZWR1ZndyYnphc2t5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzMwMTUsImV4cCI6MjA5MzgwOTAxNX0.PObPLw4g-jC43864lxc4tRUtXBnZwOfKq0YlvU76dCw"
  SUPABASE_SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3d21kcnpzZWR1ZndyYnphc2t5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODIzMzAxNSwiZXhwIjoyMDkzODA5MDE1fQ.c_UpnhvC_4QaYc7I47fP5gQ4G8FXRyfW5ZK9HAuvZzc"
  # Email (Gmail SMTP via Nodemailer)
  GMAIL_USER = "peyman.iravani@gmail.com"
  GMAIL_APP_PASSWORD = ""

# ─────────────────────────────────────────────
# Cache: immutable Next.js static assets
# (hashed filenames — safe to cache forever)
# ─────────────────────────────────────────────

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─────────────────────────────────────────────
# Security headers (complement next.config.ts)
# ─────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─────────────────────────────────────────────
# Netlify Functions — TypeScript, compiled by esbuild
# beta-request, pricing-inquiry, health-check
# ─────────────────────────────────────────────

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ─────────────────────────────────────────────
# Next.js plugin — converts API routes to
# Netlify Functions and proxy.ts to Edge Functions
# ─────────────────────────────────────────────

[[plugins]]
  package = "@netlify/plugin-nextjs"
